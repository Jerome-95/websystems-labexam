<!DOCTYPE html>
<html lang="en">
<head>
  <title>Jerome — Login Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card p-4 shadow" style="width: 400px;">
      
      <div class="text-center mb-3">
        <img src="assets/ac-logo.png" alt="School Logo" class="rounded-circle" width="80" height="80">
      </div>

      <h3 class="text-center mb-0">Student Login</h3>
      <p class="text-center text-muted mb-3">Jerome C. Evangelista</p>

      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" value="Jerome C. Evangelista">
      </div>

      <div class="mb-3">
        <label class="form-label">Email address</label>
        <input type="email" class="form-control" value="jerome.evangelista@example.com">
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" value="password123">
      </div>

      <button id="loginBtn" class="btn btn-success w-100">Login</button>

      <p class="text-center mt-3">
        Do not have an account? <a href="#">Register</a>
      </p>

    </div>
  </div>

<script>
  document.getElementById('loginBtn').addEventListener('click', function() {
    alert("Login Successful! Redirecting to Dashboard...");
    window.location.href = "dashboard.html"; 
  });
</script>

</body>
</html>
