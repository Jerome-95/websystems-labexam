<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jerome — Login Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card p-4 shadow-sm" style="width: 400px; border: none;">
      
      <div class="text-center mb-3">
        <img src="Assets/ac-logo.png" alt="Profile Picture" class="rounded-circle mb-2">
      </div>

      <h3 class="text-center mb-0">Student Login</h3>
      <p class="text-center text-muted mb-4">Jerome C. Evangelista</p>

      <form>
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" placeholder="Jerome C. Evangelista">
        </div>

        <div class="mb-3">
          <label class="form-label">Email address</label>
          <input type="email" class="form-control" placeholder="jerome.evangelista@example.com">
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" value="password123">
        </div>

        <button type="button" id="loginBtn" class="btn btn-success w-100">Login</button>
      </form>

      <p class="text-center mt-3 mb-0">
        Do not have an account? <a href="#" class="text-decoration-none">Register</a>
      </p>

    </div>
  </div>

<script>
  document.getElementById('loginBtn').addEventListener('click', function() {
    alert("Login Successful! Redirecting to Dashboard...");
    window.location.href = "dashboard.html"; 
  });
</script>

</body>
</html>
